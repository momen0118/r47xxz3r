<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>燈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== サイドバー（スレッド管理） ===== -->
<div class="overlay" id="overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-title">threads</span>
    <button class="icon-btn" id="newThreadBtn" title="新規スレッド">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>
  <div class="thread-list" id="threadList"></div>
  <div class="sidebar-footer">
    <button class="text-btn" id="openSettingsBtn">設定</button>
  </div>
</aside>

<!-- ===== メインエリア ===== -->
<main class="main">
  <header class="topbar">
    <button class="icon-btn" id="menuBtn" title="メニュー">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
    </button>
    <span class="topbar-title" id="topbarTitle">燈</span>
    <button class="icon-btn" id="topbarSettingsBtn" title="設定">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
    </button>
  </header>

  <div class="chat-area" id="chatArea">
    <div class="chat-messages" id="chatMessages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">燈</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="messageInput" placeholder="…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</main>

<!-- ===== 設定モーダル ===== -->
<div class="modal-overlay" id="settingsOverlay">
  <div class="modal" id="settingsModal">
    <div class="modal-header">
      <span>設定</span>
      <button class="icon-btn" id="closeSettingsBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <label class="field-label">API Key</label>
      <div class="api-key-row">
        <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off">
        <button class="icon-btn toggle-vis" id="toggleKeyVis" title="表示切替">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <label class="field-label">Model</label>
      <select id="modelSelect">
        <option value="claude-opus-4-6">Opus 4.6</option>
        <option value="claude-sonnet-4-6">Sonnet 4.6</option>
        <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
      </select>

      <label class="field-label">System Prompt</label>
      <textarea id="systemPromptInput" rows="10" placeholder="指示文をここに…"></textarea>

      <label class="field-label">Max Tokens</label>
      <input type="number" id="maxTokensInput" value="4096" min="256" max="32768" step="256">

      <div class="modal-actions">
        <button class="primary-btn" id="saveSettingsBtn">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== スレッド名変更モーダル ===== -->
<div class="modal-overlay" id="renameOverlay">
  <div class="modal modal-sm">
    <div class="modal-header">
      <span>スレッド名</span>
      <button class="icon-btn" id="closeRenameBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="text" id="renameInput" placeholder="名前">
      <div class="modal-actions">
        <button class="primary-btn" id="saveRenameBtn">変更</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
